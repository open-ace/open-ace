<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Token Analyzer - Logged Out</title>
    <script src="/static/js/Chart.min.js"></script>
    <link href="/static/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }

        .logout-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .logout-icon {
            font-size: 60px;
            color: #667eea;
            margin-bottom: 20px;
        }

        .logout-title {
            color: #333;
            font-size: 24px;
            margin-bottom: 10px;
        }

        .logout-message {
            color: #666;
            margin-bottom: 30px;
        }

        .btn-primary {
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px 30px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-primary:hover {
            background: #5a6fd6;
        }

        .redirecting {
            color: #667eea;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="logout-container">
        <div class="logout-icon">
            <i class="bi bi-box-arrow-right"></i>
        </div>
        <h1 class="logout-title">Logged Out Successfully</h1>
        <p class="logout-message">You have been logged out of AI Token Analyzer.</p>
        <button class="btn-primary" onclick="window.location.href='/login'">Go to Login</button>
        <p class="redirecting">Redirecting to login page...</p>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Clear session storage
            sessionStorage.clear();
            localStorage.clear();

            // Clear cookies
            document.cookie.split(";").forEach(function(c) {
                var name = c.split("=")[0].trim();
                document.cookie = name + "=;expires=Thu, 01 Jan 1970 00:00:00 GMT;path=/";
            });

            // Redirect after a short delay
            setTimeout(function() {
                window.location.href = '/login';
            }, 1500);
        });
    </script>
</body>
</html>
