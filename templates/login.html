<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Token Analyzer - Login</title>
    <script src="/static/js/Chart.min.js"></script>
    <link href="/static/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/bootstrap-icons.css">
    <style>
        :root {
            --primary-color: #667eea;
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --sidebar-width: 250px;
        }

        body {
            background: var(--primary-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            width: 100%;
            max-width: 450px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .login-header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .login-header p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            color: #495057;
            font-weight: 600;
            margin-bottom: 8px;
            display: block;
        }

        .form-group input {
            border: 2px solid #e9ecef;
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 15px;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .btn-login {
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 14px 24px;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        .btn-login:hover {
            background: #5a6fd6;
            transform: translateY(-2px);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .form-footer {
            margin-top: 25px;
            text-align: center;
            font-size: 14px;
            color: #666;
        }

        .form-footer a {
            color: var(--primary-color);
            text-decoration: none;
        }

        .form-footer a:hover {
            text-decoration: underline;
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #ffffff;
            border-bottom-color: transparent;
            border-radius: 50%;
            animation: rotation 0.8s linear infinite;
            margin-right: 8px;
        }

        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .login-footer {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e9ecef;
            text-align: center;
            font-size: 12px;
            color: #666;
        }

        .lang-selector-container {
            position: absolute;
            top: 20px;
            right: 20px;
        }

        .lang-selector {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 6px;
            padding: 6px 12px;
            color: white;
            font-size: 14px;
            cursor: pointer;
        }

        .lang-selector option {
            color: #333;
        }
    </style>
</head>
<body>
    <!-- Language Selector -->
    <div class="lang-selector-container">
        <select class="lang-selector" id="lang-select" onchange="switchLang(this.value)">
            <option value="en">English</option>
            <option value="zh">中文</option>
        </select>
    </div>

    <div class="login-container">
        <div class="login-header">
            <h1><i class="bi bi-bar-chart-line"></i> AI Token Analyzer</h1>
            <p id="login-subtitle">Please sign in to continue</p>
        </div>

        <div id="error-message" class="error-message"></div>
        <div id="success-message" class="success-message"></div>

        <form id="login-form">
            <div class="form-group">
                <label for="username" id="username-label">Username</label>
                <input type="text" id="username" name="username" placeholder="" required autofocus>
            </div>

            <div class="form-group">
                <label for="password" id="password-label">Password</label>
                <input type="password" id="password" name="password" placeholder="" required>
            </div>

            <button type="submit" class="btn-login" id="login-btn">
                <span id="login-btn-text">Sign In</span>
            </button>
        </form>

        {% if show_default_credentials %}
        <div class="form-footer" id="default-credentials-notice">
            <p id="default-credentials-text">Default admin credentials: <strong>admin / admin123</strong></p>
            <p id="change-password-notice">Change the default password after first login!</p>
        </div>
        {% endif %}

        <div class="login-footer">
            <p>&copy; 2026 AI Token Analyzer. All rights reserved.</p>
        </div>
    </div>

    <script src="/static/js/auth.js"></script>
    <script>
        // i18n translations for login page
        const i18n = {
            en: {
                loginSubtitle: 'Please sign in to continue',
                usernameLabel: 'Username',
                passwordLabel: 'Password',
                usernamePlaceholder: 'Enter your username',
                passwordPlaceholder: 'Enter your password',
                signInBtn: 'Sign In',
                signingIn: 'Signing in...',
                loginSuccess: 'Login successful! Redirecting...',
                invalidCredentials: 'Invalid username or password',
                errorOccurred: 'An error occurred',
                defaultCredentials: 'Default admin credentials:',
                changePasswordNotice: 'Change the default password after first login!'
            },
            zh: {
                loginSubtitle: '请登录以继续',
                usernameLabel: '用户名',
                passwordLabel: '密码',
                usernamePlaceholder: '请输入用户名',
                passwordPlaceholder: '请输入密码',
                signInBtn: '登录',
                signingIn: '登录中...',
                loginSuccess: '登录成功！正在跳转...',
                invalidCredentials: '用户名或密码错误',
                errorOccurred: '发生错误',
                defaultCredentials: '默认管理员账号：',
                changePasswordNotice: '首次登录后请修改默认密码！'
            }
        };

        // Current language
        let currentLang = localStorage.getItem('ai_token_lang') || 'en';

        // Get translation
        function t(key) {
            return i18n[currentLang][key] || i18n['en'][key] || key;
        }

        // Switch language
        function switchLang(lang) {
            currentLang = lang;
            localStorage.setItem('ai_token_lang', lang);
            updatePageText();
        }

        // Update page text based on current language
        function updatePageText() {
            document.getElementById('login-subtitle').textContent = t('loginSubtitle');
            document.getElementById('username-label').textContent = t('usernameLabel');
            document.getElementById('password-label').textContent = t('passwordLabel');
            document.getElementById('username').placeholder = t('usernamePlaceholder');
            document.getElementById('password').placeholder = t('passwordPlaceholder');
            document.getElementById('login-btn-text').textContent = t('signInBtn');

            // Update default credentials notice if visible
            const defaultCredentialsText = document.getElementById('default-credentials-text');
            const changePasswordNotice = document.getElementById('change-password-notice');
            if (defaultCredentialsText) {
                defaultCredentialsText.innerHTML = t('defaultCredentials') + ' <strong>admin / admin123</strong>';
            }
            if (changePasswordNotice) {
                changePasswordNotice.textContent = t('changePasswordNotice');
            }

            // Update language selector
            document.getElementById('lang-select').value = currentLang;
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', function() {
            // Set initial language
            document.getElementById('lang-select').value = currentLang;
            updatePageText();

            const loginForm = document.getElementById('login-form');
            const loginBtn = document.getElementById('login-btn');
            const loginBtnText = document.getElementById('login-btn-text');
            const errorMessage = document.getElementById('error-message');
            const successMessage = document.getElementById('success-message');

            // Note: We don't check authentication here to avoid redirect loops
            // The server will handle redirection if user is already authenticated

            loginForm.addEventListener('submit', async function(e) {
                e.preventDefault();

                const username = document.getElementById('username').value;
                const password = document.getElementById('password').value;

                // Clear messages
                errorMessage.classList.remove('show');
                successMessage.classList.remove('show');

                // Show loading state
                loginBtn.disabled = true;
                loginBtnText.innerHTML = '<span class="loading"></span> ' + t('signingIn');

                try {
                    console.log('Attempting login for:', username);
                    const result = await Auth.login(username, password);
                    console.log('Login result:', result);

                    if (result.success) {
                        console.log('Login successful, waiting for auth init...');
                        successMessage.textContent = t('loginSuccess');
                        successMessage.classList.add('show');

                        // Wait for auth initialization to complete
                        if (typeof Auth !== 'undefined' && Auth.ready) {
                            await Auth.ready;
                            console.log('Auth ready, updating menu...');
                        }

                        // Update navigation
                        Auth.updateNavMenu();

                        // Clear form
                        document.getElementById('password').value = '';

                        // Wait a moment then redirect
                        setTimeout(function() {
                            console.log('Redirecting to home page...');
                            window.location.href = '/';
                        }, 500);
                    } else {
                        console.error('Login failed:', result.error);
                        errorMessage.textContent = result.error || t('invalidCredentials');
                        errorMessage.classList.add('show');
                    }
                } catch (error) {
                    console.error('Login error:', error);
                    errorMessage.textContent = t('errorOccurred') + ': ' + error.message;
                    errorMessage.classList.add('show');
                } finally {
                    loginBtn.disabled = false;
                    loginBtnText.textContent = t('signInBtn');
                }
            });
        });
    </script>
</body>
</html>
