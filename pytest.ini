[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
filterwarnings =
    ignore::DeprecationWarning

# Test markers for different test types
markers =
    unit: Unit tests (fast, no external dependencies)
    ui: UI tests using Playwright
    regression: Regression tests for core functionality
    issue: Issue-specific tests (use --issue=N to run specific issue)

# Exclude scripts directory and playwright tests from test discovery
# E2E/UI tests require a running Flask server and are excluded from CI
norecursedirs = scripts .qwen tests/issues tests/regression tests/ui tests/164 tests/165 tests/172 tests/189 tests/performance
addopts = -v --tb=short --ignore=tests/test_machine_permission.py --ignore=tests/unit/test_workspace_modules.py --ignore=tests/unit/test_db.py