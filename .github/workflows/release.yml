name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pre-release-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - uses: actions/checkout@v6

    - name: Setup Node.js
      uses: actions/setup-node@v7
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Build frontend
      working-directory: frontend
      run: |
        npm ci
        npm run build

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
        cache: pip

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install playwright
        playwright install chromium --with-deps

    - name: Run critical release regression tests
      run: |
        python scripts/run_extended_tests.py \
          --category critical \
          --isolated-home \
          --reruns 1 \
          --timeout 180 \
          --maxfail 5 \
          --junitxml test-results/release-critical.xml
      env:
        CI: true
        HEADLESS: true

    - name: Upload release test report
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: release-critical-extended-tests
        path: |
          test-results/
          screenshots/
        if-no-files-found: ignore
        retention-days: 30

  build-and-publish:
    runs-on: ubuntu-latest
    needs: [pre-release-tests]
    env:
      PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Build package
      run: |
        python -m pip install --upgrade pip
        pip install build
        python -m build --sdist --wheel --outdir dist/

    - name: Publish to PyPI
      if: env.PYPI_API_TOKEN != ''
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        password: ${{ env.PYPI_API_TOKEN }}

    - name: Skip PyPI publish
      if: env.PYPI_API_TOKEN == ''
      run: echo "PYPI_API_TOKEN is not configured; skipping PyPI publish."

    - name: Upload release assets
      uses: softprops/action-gh-release@v3
      with:
        files: dist/*
