name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Bandit
        run: pip install bandit[toml]

      - name: Run Bandit security check
        # Use severity+confidence layering with baseline support (Issue #1856)
        # Bypass with 'skip-security-check' label for emergencies only
        if: "!contains(github.event.pull_request.labels.*.name, 'skip-security-check')"
        run: python scripts/lint/bandit_check.py --baseline scripts/lint/bandit_baseline.json

      - name: Security check bypassed warning
        if: contains(github.event.pull_request.labels.*.name, 'skip-security-check')
        run: echo "::warning::Security check bypassed with skip-security-check label. This should only be used in emergencies."

      # Issue #1897: API Security Scanner
      - name: Run API Security Scanner
        if: "!contains(github.event.pull_request.labels.*.name, 'skip-security-check')"
        run: python scripts/lint/api_security_scanner.py

      - name: Validate security baseline metadata
        if: "!contains(github.event.pull_request.labels.*.name, 'skip-security-check')"
        run: python scripts/lint/validate_baseline_metadata.py

      - name: Run pre-commit (excluding Bandit)
        uses: pre-commit/action@v3.0.1
        env:
          # Bandit is handled separately above with baseline support.
          # Skip no-commit-to-branch in CI: GitHub branch protection already
          # prevents direct pushes; this hook is for local development only.
          SKIP: bandit,no-commit-to-branch

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio
          pip install playwright
          playwright install chromium --with-deps

      - name: Run tests
        run: |
          # E2E/Playwright/HTTP tests live under tests/e2e/ and are excluded via
          # pytest.ini's norecursedirs. PostgreSQL tests are marked and deselected
          # here; they run in the postgres-test job below.
          # Coverage includes scripts/shared and P0 security modules (Issue #1856)
          pytest tests/ -v \
            --cov=scripts/shared \
            --cov=app/auth \
            --cov=app/remote_ws_handler \
            --cov=app/modules/sso \
            --cov-report=xml \
            --cov-report=html \
            -m "not postgres"

      - name: Upload coverage to Codecov
        timeout-minutes: 2
        continue-on-error: true
        uses: codecov/codecov-action@v6
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Build package
        run: |
          python -m pip install --upgrade pip
          pip install build
          python -m build --sdist --wheel --outdir dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-packages
          path: dist/

  docker:
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: open-ace:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # PostgreSQL integration tests (Issue #1856)
  # Runs only when database-related files are changed
  postgres-test:
    runs-on: ubuntu-latest
    # Skip if explicitly requested via label
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && !contains(github.event.pull_request.labels.*.name, 'skip-extended-tests'))
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: ace
          POSTGRES_PASSWORD: ace
          POSTGRES_DB: ace_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ace -d ace_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check for relevant changes
        id: changes
        if: github.event_name == 'pull_request'
        run: |
          # Check if database-related files were modified
          git diff --name-only origin/main...HEAD > changed_files.txt || true
          if grep -qE '(app/repositories/|migrations/|tests/integration/.*_pg\.py|app/models/)' changed_files.txt; then
            echo "run_tests=true" >> $GITHUB_OUTPUT
          else
            echo "run_tests=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Python
        if: |
          github.event_name == 'push' ||
          steps.changes.outputs.run_tests == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        if: |
          github.event_name == 'push' ||
          steps.changes.outputs.run_tests == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio

      - name: Run Postgres integration tests
        if: |
          github.event_name == 'push' ||
          steps.changes.outputs.run_tests == 'true'
        run: pytest tests/integration -v -m postgres --tb=short
        env:
          DATABASE_URL: postgresql://ace:ace@localhost:5432/ace_test
          # Use separate database to avoid conflict with schema-sync workflow
          ACE_DATABASE_NAME: ace_test

  # Security Audit Gate (Issue #1890)
  # Blocks PRs with known high/critical vulnerabilities in production dependencies
  # Bypass with 'skip-security-check' label for emergencies only
  security-gate:
    name: Security Audit Gate
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: "!contains(github.event.pull_request.labels.*.name, 'skip-security-check')"

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit Python dependencies
        id: pip-audit
        run: |
          # Run pip-audit for production dependencies only
          pip-audit -r requirements.txt --skip-editable || exit_code=$?

          if [ "${exit_code:-0}" -ne 0 ]; then
            echo "::error::pip-audit found vulnerabilities in Python dependencies. Add 'skip-security-check' label to bypass in emergencies."
            exit 1
          fi

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install npm dependencies
        working-directory: frontend
        run: npm ci

      - name: Audit npm dependencies
        working-directory: frontend
        env:
          # Force the official registry: mirror registries (e.g. npmmirror.com)
          # do not implement the /security/audits endpoint and return 404,
          # which would otherwise fail this gate with a false positive.
          npm_config_registry: https://registry.npmjs.org
        run: |
          # Run npm audit for production dependencies only.
          # --registry pins the audit to the official npm registry per the
          # issue #1890 acceptance criteria.
          npm audit --omit=dev --audit-level=high --registry=https://registry.npmjs.org || exit_code=$?

          if [ "${exit_code:-0}" -ne 0 ]; then
            echo "::error::npm audit found high/critical vulnerabilities in production dependencies. Add 'skip-security-check' label to bypass in emergencies."
            exit 1
          fi

      - name: Security gate passed
        run: echo "✅ Security audit passed - no high/critical vulnerabilities found in production dependencies"
