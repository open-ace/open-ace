name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1
        env:
          # The repository has existing Bandit findings; keep Bandit available
          # for local/incremental checks, but do not fail full-repo CI on legacy
          # issues unrelated to the current PR.
          # Skip no-commit-to-branch in CI: GitHub branch protection already
          # prevents direct pushes; this hook is for local development only.
          SKIP: bandit,no-commit-to-branch

  schema-sync:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: ace
          POSTGRES_PASSWORD: ace
          POSTGRES_DB: ace_schema_sync
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ace -d ace_schema_sync"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Rebuild and validate schema snapshots
        env:
          SCHEMA_SYNC_DATABASE_URL: postgresql://ace:ace@127.0.0.1:5432/ace_schema_sync
        run: |
          python scripts/rebuild_schema_snapshots.py --postgres-url "$SCHEMA_SYNC_DATABASE_URL"
          python scripts/check_schema_sync.py --postgres-url "$SCHEMA_SYNC_DATABASE_URL"
          python scripts/validate_schema.py
          git diff --exit-code -- schema/schema-postgres.sql schema/schema-sqlite.sql

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio
          pip install playwright
          playwright install chromium --with-deps

      - name: Run tests
        run: |
          pytest tests/ -v --cov=scripts/shared --cov-report=xml --cov-report=html --ignore=tests/ui --ignore=tests/issues --ignore=tests/regression --ignore=tests/performance --ignore=tests/e2e --ignore=tests/integration/test_auth_service_pg.py --ignore=tests/integration/test_daily_stats_repo_pg.py --ignore=tests/integration/test_governance_repo_pg.py --ignore=tests/integration/test_project_repo_pg.py --ignore=tests/integration/test_tenant_repo_pg.py --ignore=tests/integration/test_user_tool_account_repo_pg.py --ignore=tests/integration/test_retention_pg.py

      - name: Upload coverage to Codecov
        timeout-minutes: 2
        continue-on-error: true
        uses: codecov/codecov-action@v6
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  build:
    runs-on: ubuntu-latest
    needs: [lint, schema-sync, test]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Build package
        run: |
          python -m pip install --upgrade pip
          pip install build
          python -m build --sdist --wheel --outdir dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-packages
          path: dist/

  docker:
    runs-on: ubuntu-latest
    needs: [lint, schema-sync, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: open-ace:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
