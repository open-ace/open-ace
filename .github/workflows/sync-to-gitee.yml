name: Sync to Gitee

on:
  push:
    branches: [ main, master ]
  pull_request:
    types: [ closed ]
    branches: [ main, master ]
  workflow_dispatch: # 允许手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0 # 获取完整历史

      - name: Set up Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Add Gitee remote
        run: |
          git remote add gitee https://${{ secrets.GITEE_USERNAME }}:${{ secrets.GITEE_TOKEN }}@gitee.com/open-ace/open-ace.git

      - name: Push to Gitee (all branches and tags)
        run: |
          git push --force gitee --all
          git push --force gitee --tags
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}

      - name: Notify on failure
        if: failure()
        run: |
          echo "⚠️ Sync to Gitee failed!"
          echo "Check the workflow logs for details."
          # 可选：集成企业微信/钉钉通知（需额外配置）
