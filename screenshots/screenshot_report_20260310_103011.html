<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>截图报告</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            background: #f5f5f5;
        }
        h1 {
            color: #333;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        .meta {
            color: #666;
            margin-bottom: 20px;
        }
        .screenshot {
            margin: 20px 0;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .screenshot h3 {
            margin: 0;
            padding: 12px 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 14px;
        }
        .screenshot img {
            max-width: 100%;
            display: block;
            margin: 0 auto;
        }
        .footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #ddd;
            color: #999;
            font-size: 12px;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>📸 截图报告</h1>
    <div class="meta">
        <p>生成时间：2026-03-10 10:30:11</p>
        <p>截图数量：2</p>
    </div>
    
    
    <div class="screenshot">
        <h3>1. Analysis section</h3>
        <img src="screenshot_20260310_103004_01_analysis.png" alt="Analysis section">
    </div>
    <div class="screenshot">
        <h3>2. Key Metrics cards</h3>
        <img src="screenshot_20260310_103004_02_metrics.png" alt="Key Metrics cards">
    </div>
    
    <div class="footer">
        <p>Generated by Qwen Playwright Skill</p>
    </div>
</body>
</html>
