# Pre-commit hooks configuration
# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks

repos:
  # =============================================================================
  # Local Hooks
  # =============================================================================
  - repo: local
    hooks:
      # Check if schema.sql needs to be regenerated when migrations change
      - id: check-schema-sync
        name: Check schema.sql sync
        entry: scripts/hooks/check_schema_sync.sh
        language: script
        files: ^migrations/versions/.*\.py$
        pass_filenames: false

      # Assert the migration graph has exactly one head.
      # Note: this only sees the current working tree, so it catches a single
      # branch forking its own chain — NOT the cross-branch fork that occurs
      # when two PRs each fork off the same parent. That cross-branch case is
      # guarded by .github/workflows/migration-graph.yml, which runs this same
      # script against a pre-merged migration tree.
      - id: check-migration-heads
        name: Check single migration head
        entry: python3 scripts/check_migration_heads.py
        language: system
        files: ^migrations/versions/.*\.py$
        pass_filenames: false

      # Enforce migration authoring rules (Issue #1704):
      #   MIG001 — no runtime app.* imports (breaks the synthetic-tree
      #            migration-graph load with an opaque ImportError)
      #   MIG002 — CONCURRENTLY index ops must use the approved
      #            autocommit_block() + postgresql_concurrently=True pattern
      # This sees only the current working tree; the migration-graph CI job runs
      # the authoritative check against the pre-merged tree (see that workflow).
      - id: check-migration-rules
        name: Check migration authoring rules (MIG001/MIG002)
        entry: python3 scripts/lint/check_migration_rules.py
        language: system
        files: ^migrations/versions/.*\.py$
        pass_filenames: false

      # Validate PostgreSQL schema for boolean field consistency
      - id: validate-schema
        name: Validate PostgreSQL schema boolean fields
        entry: python3 scripts/validate_schema.py
        language: system
        files: ^schema/schema-postgres\.sql$
        pass_filenames: false

      # SQL compatibility check (incremental — only staged files)
      - id: sql-compat-check
        name: SQL Compatibility Check
        entry: python3 scripts/lint/sql_compat_checker.py
        language: system
        files: ^(app|scripts)/.*\.py$
        pass_filenames: true

      # API security scanner — detect routes missing authentication
      - id: api-security-scan
        name: API Security Scan
        entry: python3 scripts/lint/api_security_scanner.py
        language: system
        files: ^app/routes/.*\.py$
        pass_filenames: false
      - id: table-boundary-check
        name: Table Boundary Check (#1125)
        entry: python3 scripts/lint/table_boundary_checker.py
        language: system
        # Always run: the guard parses fixed route sets AND the repo files
        # (usage_repo/message_repo) it cross-references for call-graph analysis,
        # so it must trigger even on a repo-only change (e.g. re-adding
        # daily_messages to get_session_only_usage) — pre-commit's changed-files
        # filter would otherwise skip it.
        always_run: true
        pass_filenames: false

  # =============================================================================
  # Code Formatting
  # =============================================================================
  - repo: https://github.com/psf/black
    rev: 25.1.0
    hooks:
      - id: black
        language_version: python3.12
        args: [--config, pyproject.toml]

  # Import sorting
  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: [--settings-path, pyproject.toml]

  # =============================================================================
  # Linting
  # =============================================================================
  - repo: https://github.com/charliermarsh/ruff-pre-commit
    rev: v0.3.4
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]

  # =============================================================================
  # Type Checking
  # =============================================================================
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.9.0
    hooks:
      - id: mypy
        args: [--config-file, pyproject.toml]
        additional_dependencies:
          - types-requests
        pass_filenames: false
        entry: mypy scripts/shared server.py cli.py

  # =============================================================================
  # Security Checks
  # =============================================================================
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.8
    hooks:
      - id: bandit
        args: [-c, pyproject.toml]
        additional_dependencies: ["bandit[toml]"]

  # =============================================================================
  # General Checks
  # =============================================================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        exclude: ^static/|^templates/
      - id: end-of-file-fixer
        exclude: ^static/|^templates/
      - id: check-yaml
        args: [--unsafe]
      - id: check-json
        exclude: tsconfig\.json$
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=1000]
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
        exclude: ^tests/|\.qwen/
      - id: debug-statements
      - id: detect-private-key
      - id: no-commit-to-branch
        args: [--branch, main, --branch, master]

  # =============================================================================
  # Documentation
  # =============================================================================
  - repo: https://github.com/pycqa/pydocstyle
    rev: 6.3.0
    hooks:
      - id: pydocstyle
        args: ["--ignore=D100,D102,D103,D107,D200,D202,D203,D205,D212,D213,D400,D401,D406,D407,D413,D415"]
        exclude: ^tests/|^scripts/
