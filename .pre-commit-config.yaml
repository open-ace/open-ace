# Pre-commit hooks configuration
# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks

repos:
  # =============================================================================
  # Local Hooks
  # =============================================================================
  - repo: local
    hooks:
      # Check if schema.sql needs to be regenerated when migrations change
      - id: check-schema-sync
        name: Check schema.sql sync
        entry: scripts/hooks/check_schema_sync.sh
        language: script
        files: ^migrations/versions/.*\.py$
        pass_filenames: false

      # Validate PostgreSQL schema for boolean field consistency
      - id: validate-schema
        name: Validate PostgreSQL schema boolean fields
        entry: python3 scripts/validate_schema.py
        language: system
        files: ^schema/schema-postgres\.sql$
        pass_filenames: false

      # SQL compatibility check (incremental — only staged files)
      - id: sql-compat-check
        name: SQL Compatibility Check
        entry: python3 scripts/lint/sql_compat_checker.py
        language: system
        files: ^(app|scripts)/.*\.py$
        pass_filenames: true

  # =============================================================================
  # Code Formatting
  # =============================================================================
  - repo: https://github.com/psf/black
    rev: 26.3.1
    hooks:
      - id: black
        language_version: python3.12
        args: [--config, pyproject.toml]

  # Import sorting
  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: [--settings-path, pyproject.toml]

  # =============================================================================
  # Linting
  # =============================================================================
  - repo: https://github.com/charliermarsh/ruff-pre-commit
    rev: v0.3.4
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]

  # =============================================================================
  # Type Checking
  # =============================================================================
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.9.0
    hooks:
      - id: mypy
        args: [--config-file, pyproject.toml]
        additional_dependencies:
          - types-requests
        pass_filenames: false
        entry: mypy scripts/shared web.py cli.py

  # =============================================================================
  # Security Checks
  # =============================================================================
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.8
    hooks:
      - id: bandit
        args: [-c, pyproject.toml]
        additional_dependencies: ["bandit[toml]"]

  # =============================================================================
  # General Checks
  # =============================================================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        exclude: ^static/|^templates/
      - id: end-of-file-fixer
        exclude: ^static/|^templates/
      - id: check-yaml
        args: [--unsafe]
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=1000]
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: debug-statements
      - id: detect-private-key
      - id: no-commit-to-branch
        args: [--branch, main, --branch, master]

  # =============================================================================
  # Documentation
  # =============================================================================
  - repo: https://github.com/pycqa/pydocstyle
    rev: 6.3.0
    hooks:
      - id: pydocstyle
        args: [--ignore-decorators]
        exclude: ^tests/|^scripts/
