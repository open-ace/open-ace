    <title>Open ACE - AI Computing Explorer</title>
    <!-- Preconnect for faster API requests -->
    <link rel="preconnect" href="/static/js/dist/" />
    <script type="module" crossorigin src="/static/js/dist/index.CzcqWvSI.js"></script>
    <link rel="modulepreload" crossorigin href="/static/js/dist/react-vendor.B9Kl00_S.js">
    <link rel="modulepreload" crossorigin href="/static/js/dist/utils.CvEEV5tE.js">
    <link rel="modulepreload" crossorigin href="/static/js/dist/i18n.Dqvw2aaN.js">
    <link rel="modulepreload" crossorigin href="/static/js/dist/zustand.BgdKfgGX.js">
    <link rel="modulepreload" crossorigin href="/static/js/dist/store.DQVBLgcG.js">

    <link rel="modulepreload" crossorigin href="/static/js/dist/api.Cc-cQDtR.js">

  </head>
  <body>
    <div id="root">
      <!-- Loading state shown before React loads -->
      <div class="loading-overlay d-flex align-items-center justify-content-center vh-100">
        <div class="text-center">
          <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
          </div>
          <p class="mt-3 text-muted">Loading Open ACE...</p>
        </div>
      </div>
    </div>
    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/static/js/dist/sw.js')
            .then((registration) => {
              console.log('SW registered:', registration.scope);
            })
            .catch((error) => {
              console.log('SW registration failed:', error);
            });
        });
      }
    </script>
  </body>
</html>
