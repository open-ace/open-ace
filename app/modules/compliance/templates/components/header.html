<div class="meta-info">
    <h1>{{ report_title | e }}</h1>
    <p>
        <span class="meta-label">Report Type:</span>
        <span>{{ report_type_display | e }}</span>
    </p>
    <p>
        <span class="meta-label">Report Period:</span>
        <span>{{ period_start | e }} to {{ period_end | e }}</span>
    </p>
    <p>
        <span class="meta-label">Generated At:</span>
        <span>{{ generated_at | e }}</span>
    </p>
    {% if generated_by %}
    <p>
        <span class="meta-label">Generated By:</span>
        <span>{{ generated_by_name | e }}</span>
    </p>
    {% endif %}
    <p>
        <span class="meta-label">Report ID:</span>
        <span>{{ report_id | e }}</span>
    </p>
</div>
