# Open ACE - Database Restore Job
# One-time job to restore database from backup
# Issue #1853
#
# Usage:
#   1. Set RESTORE_TIMESTAMP environment variable (format: YYYYMMDD)
#   2. Apply this manifest: kubectl apply -f restore-job.yaml
#   3. Monitor logs: kubectl logs -f job/postgres-restore -n open-ace
#
# NOTE: Uses initContainer to install AWS CLI into an emptyDir volume,
# which is then shared with the main container.

apiVersion: batch/v1
kind: Job
metadata:
  name: postgres-restore
  namespace: open-ace
  labels:
    app.kubernetes.io/name: open-ace
    app.kubernetes.io/component: restore
spec:
  # Don't retry automatically - let user decide
  backoffLimit: 0

  # Timeout after 2 hours
  activeDeadlineSeconds: 7200

  template:
    metadata:
      labels:
        app.kubernetes.io/name: open-ace
        app.kubernetes.io/component: restore
    spec:
      serviceAccountName: open-ace-backup
      restartPolicy: Never

      # InitContainer to install AWS CLI
      initContainers:
        - name: install-awscli
          image: alpine:3.19
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "Installing AWS CLI..."
              apk add --no-cache aws-cli
              cp /usr/bin/aws /awscli/aws
              echo "AWS CLI installed successfully"
          volumeMounts:
            - name: aws-cli
              mountPath: /awscli

      containers:
        - name: restore
          image: postgres:15-alpine

          command:
            - /bin/sh
            - /scripts/restore.sh

          env:
            # Database connection
            - name: DB_HOST
              value: "postgres"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: open-ace-env
                  key: DB_NAME
                  optional: true
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: open-ace-secrets
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: open-ace-secrets
                  key: DB_PASSWORD

            # Object storage credentials
            - name: S3_BUCKET
              valueFrom:
                secretKeyRef:
                  name: backup-storage-credentials
                  key: S3_BUCKET
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: backup-storage-credentials
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: backup-storage-credentials
                  key: AWS_SECRET_ACCESS_KEY
            - name: AWS_REGION
              valueFrom:
                secretKeyRef:
                  name: backup-storage-credentials
                  key: AWS_REGION
                  optional: true
            - name: S3_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: backup-storage-credentials
                  key: S3_ENDPOINT
                  optional: true

            # IMPORTANT: Set this to the backup date to restore (format: YYYYMMDD)
            # Example: 20240115
            - name: RESTORE_TIMESTAMP
              value: ""

          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi

          volumeMounts:
            - name: backup-script
              mountPath: /scripts
              readOnly: true
            - name: tmp
              mountPath: /tmp
            - name: aws-cli
              mountPath: /usr/local/bin/aws
              subPath: aws

      volumes:
        - name: backup-script
          configMap:
            name: backup-script
            defaultMode: 0755
        - name: tmp
          emptyDir: {}
        - name: aws-cli
          emptyDir: {}

      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        fsGroup: 999
