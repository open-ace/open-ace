# Open ACE - Backup Script ConfigMap
# Contains the backup script with integrity verification
# Issue #1853
#
# NOTE: AWS CLI is provided by the initContainer in cronjob.yaml/restore-job.yaml
# The aws binary is mounted at /usr/local/bin/aws

apiVersion: v1
kind: ConfigMap
metadata:
  name: backup-script
  namespace: open-ace
  labels:
    app.kubernetes.io/name: open-ace
    app.kubernetes.io/component: backup
data:
  backup.sh: |
    #!/bin/sh
    # Open ACE - PostgreSQL Backup Script with Integrity Verification
    # Issue #1853
    #
    # NOTE: AWS CLI is provided by initContainer (mounted at /usr/local/bin/aws)

    set -e

    # Colors for output
    RED='\033[0;31m'
    GREEN='\033[0;32m'
    YELLOW='\033[1;33m'
    NC='\033[0m' # No Color

    # Configuration from environment variables
    DB_HOST="${DB_HOST:-postgres}"
    DB_PORT="${DB_PORT:-5432}"
    DB_NAME="${DB_NAME:-openace}"
    DB_USER="${DB_USER:-openace}"
    DB_PASSWORD="${DB_PASSWORD:-}"

    # Object storage configuration
    S3_BUCKET="${S3_BUCKET:-}"
    S3_ENDPOINT="${S3_ENDPOINT:-}"
    AWS_ACCESS_KEY_ID="${AWS_ACCESS_KEY_ID:-}"
    AWS_SECRET_ACCESS_KEY="${AWS_SECRET_ACCESS_KEY:-}"
    AWS_REGION="${AWS_REGION:-us-east-1}"

    # Backup configuration
    BACKUP_DIR="/tmp/backup-$(date +%Y%m%d-%H%M%S)"
    TIMESTAMP=$(date +%Y%m%d)

    echo "=========================================="
    echo "  Open ACE - Database Backup"
    echo "  Timestamp: $(date -Iseconds)"
    echo "=========================================="

    # Validate required environment variables
    if [ -z "$DB_PASSWORD" ]; then
      echo "${RED}ERROR: DB_PASSWORD not set${NC}"
      exit 1
    fi

    if [ -z "$S3_BUCKET" ]; then
      echo "${RED}ERROR: S3_BUCKET not set${NC}"
      exit 1
    fi

    if [ -z "$AWS_ACCESS_KEY_ID" ] || [ -z "$AWS_SECRET_ACCESS_KEY" ]; then
      echo "${RED}ERROR: AWS credentials not set${NC}"
      exit 1
    fi

    # Verify AWS CLI is available (installed by initContainer)
    if ! command -v aws > /dev/null 2>&1; then
      echo "${RED}ERROR: AWS CLI not found. InitContainer may have failed.${NC}"
      exit 1
    fi
    echo "${GREEN}AWS CLI available${NC}"

    # Create backup directory
    echo ""
    echo "${YELLOW}Creating backup directory: ${BACKUP_DIR}${NC}"
    mkdir -p "$BACKUP_DIR"

    # Record start time
    START_TIME=$(date +%s)

    # Export PGPASSWORD for pg_dump
    export PGPASSWORD="$DB_PASSWORD"

    # ========================================
    # Step 1: Database Backup
    # ========================================
    echo ""
    echo "${YELLOW}Step 1: Creating database backup...${NC}"

    # Get PostgreSQL version
    PG_VERSION=$(psql -h "$DB_HOST" -p "$DB_PORT" -U "$DB_USER" -d "$DB_NAME" -t -c "SELECT version();" 2>/dev/null | head -1 | xargs)
    PG_VERSION_NUM=$(psql -h "$DB_HOST" -p "$DB_PORT" -U "$DB_USER" -d "$DB_NAME" -t -c "SHOW server_version_num;" 2>/dev/null | head -1 | xargs)
    echo "PostgreSQL version: $PG_VERSION"
    echo "PostgreSQL version number: $PG_VERSION_NUM"

    # Record metadata
    cat > "$BACKUP_DIR/metadata.json" << EOF
    {
      "timestamp": "$(date -Iseconds)",
      "database": "$DB_NAME",
      "postgresql_version": "$PG_VERSION",
      "postgresql_version_num": "$PG_VERSION_NUM",
      "backup_type": "pg_dump -Fc"
    }
    EOF

    # Create database backup (custom format)
    echo "Running pg_dump..."
    if ! pg_dump -h "$DB_HOST" -p "$DB_PORT" -U "$DB_USER" -d "$DB_NAME" -F c -f "$BACKUP_DIR/db.dump"; then
      echo "${RED}ERROR: pg_dump failed${NC}"
      rm -rf "$BACKUP_DIR"
      exit 1
    fi

    echo "${GREEN}Database backup created: db.dump${NC}"

    # Create globals backup (roles, tablespaces)
    echo "Running pg_dumpall for globals..."
    if ! pg_dumpall -h "$DB_HOST" -p "$DB_PORT" -U "$DB_USER" --globals-only -f "$BACKUP_DIR/globals.sql" 2>/dev/null; then
      echo "${YELLOW}WARNING: pg_dumpall failed (may be expected for restricted users)${NC}"
      # Create empty globals file to avoid upload issues
      touch "$BACKUP_DIR/globals.sql"
    fi

    # ========================================
    # Step 2: Integrity Verification
    # ========================================
    echo ""
    echo "${YELLOW}Step 2: Verifying backup integrity...${NC}"

    if ! pg_restore --list "$BACKUP_DIR/db.dump" > /dev/null 2>&1; then
      echo "${RED}ERROR: Backup integrity check failed!${NC}"
      echo "The backup file is corrupted or incomplete."
      rm -rf "$BACKUP_DIR"
      exit 1
    fi

    echo "${GREEN}Integrity check passed${NC}"

    # ========================================
    # Step 3: Optional Redis Backup
    # ========================================
    if [ "${BACKUP_REDIS:-false}" = "true" ]; then
      echo ""
      echo "${YELLOW}Step 3: Creating Redis backup...${NC}"

      REDIS_HOST="${REDIS_HOST:-redis}"
      REDIS_PORT="${REDIS_PORT:-6379}"
      REDIS_PASSWORD="${REDIS_PASSWORD:-}"

      # Issue #1895: Support Redis authentication via REDISCLI_AUTH
      if [ -n "$REDIS_PASSWORD" ]; then
        export REDISCLI_AUTH="$REDIS_PASSWORD"
      fi

      # Note: Redis backup requires access to Redis PVC or sidecar container
      # This implementation only triggers BGSAVE; actual file copy needs sidecar
      if redis-cli -h "$REDIS_HOST" -p "$REDIS_PORT" BGSAVE 2>/dev/null; then
        echo "${GREEN}Redis BGSAVE initiated. Note: dump.rdb not copied - requires sidecar setup${NC}"
      else
        echo "${YELLOW}WARNING: Redis BGSAVE failed (Redis may not be available or auth required)${NC}"
      fi
    else
      echo ""
      echo "${YELLOW}Step 3: Skipping Redis backup (set BACKUP_REDIS=true to enable)${NC}"
    fi

    # ========================================
    # Step 4: Package and Upload
    # ========================================
    echo ""
    echo "${YELLOW}Step 4: Packaging and uploading to object storage...${NC}"

    # Create tarball
    BACKUP_FILE="/tmp/backup-${TIMESTAMP}.tar.gz"
    echo "Creating archive: $BACKUP_FILE"
    tar -czf "$BACKUP_FILE" -C "$BACKUP_DIR" .

    BACKUP_SIZE=$(du -h "$BACKUP_FILE" | cut -f1)
    echo "Backup size: $BACKUP_SIZE"

    # Upload to object storage
    S3_PATH="s3://${S3_BUCKET}/open-ace/${TIMESTAMP}/backup.tar.gz"

    # Configure AWS CLI
    export AWS_ACCESS_KEY_ID
    export AWS_SECRET_ACCESS_KEY

    AWS_CLI_OPTS=""
    if [ -n "$S3_ENDPOINT" ]; then
      AWS_CLI_OPTS="--endpoint-url $S3_ENDPOINT"
    fi

    echo "Uploading to: $S3_PATH"
    if ! aws s3 cp "$BACKUP_FILE" "$S3_PATH" $AWS_CLI_OPTS; then
      echo "${RED}ERROR: Failed to upload backup to object storage${NC}"
      rm -rf "$BACKUP_DIR" "$BACKUP_FILE"
      exit 1
    fi

    echo "${GREEN}Upload completed successfully${NC}"

    # ========================================
    # Step 5: Cleanup
    # ========================================
    echo ""
    echo "${YELLOW}Step 5: Cleaning up temporary files...${NC}"

    rm -rf "$BACKUP_DIR" "$BACKUP_FILE"

    # Calculate duration
    END_TIME=$(date +%s)
    DURATION=$((END_TIME - START_TIME))

    echo ""
    echo "=========================================="
    echo "${GREEN}Backup completed successfully!${NC}"
    echo "  Duration: ${DURATION}s"
    echo "  Size: ${BACKUP_SIZE}"
    echo "  Location: ${S3_PATH}"
    echo "=========================================="

    # Unset PGPASSWORD
    unset PGPASSWORD

    exit 0

  restore.sh: |
    #!/bin/sh
    # Open ACE - Database Restore Script
    # Issue #1853
    #
    # NOTE: AWS CLI is provided by initContainer (mounted at /usr/local/bin/aws)

    set -e

    # Colors for output
    RED='\033[0;31m'
    GREEN='\033[0;32m'
    YELLOW='\033[1;33m'
    NC='\033[0m' # No Color

    # Configuration from environment variables
    DB_HOST="${DB_HOST:-postgres}"
    DB_PORT="${DB_PORT:-5432}"
    DB_NAME="${DB_NAME:-openace}"
    DB_USER="${DB_USER:-openace}"
    DB_PASSWORD="${DB_PASSWORD:-}"

    # Object storage configuration
    S3_BUCKET="${S3_BUCKET:-}"
    S3_ENDPOINT="${S3_ENDPOINT:-}"
    AWS_ACCESS_KEY_ID="${AWS_ACCESS_KEY_ID:-}"
    AWS_SECRET_ACCESS_KEY="${AWS_SECRET_ACCESS_KEY:-}"

    # Restore configuration
    RESTORE_TIMESTAMP="${RESTORE_TIMESTAMP:-}"  # Format: YYYYMMDD
    RESTORE_DIR="/tmp/restore-$(date +%Y%m%d-%H%M%S)"

    echo "=========================================="
    echo "  Open ACE - Database Restore"
    echo "=========================================="

    # Validate required environment variables
    if [ -z "$DB_PASSWORD" ]; then
      echo "${RED}ERROR: DB_PASSWORD not set${NC}"
      exit 1
    fi

    if [ -z "$S3_BUCKET" ]; then
      echo "${RED}ERROR: S3_BUCKET not set${NC}"
      exit 1
    fi

    if [ -z "$RESTORE_TIMESTAMP" ]; then
      echo "${RED}ERROR: RESTORE_TIMESTAMP not set (format: YYYYMMDD)${NC}"
      exit 1
    fi

    # Verify AWS CLI is available (installed by initContainer)
    if ! command -v aws > /dev/null 2>&1; then
      echo "${RED}ERROR: AWS CLI not found. InitContainer may have failed.${NC}"
      exit 1
    fi
    echo "${GREEN}AWS CLI available${NC}"

    # Create restore directory
    mkdir -p "$RESTORE_DIR"

    # Export PGPASSWORD
    export PGPASSWORD="$DB_PASSWORD"

    # ========================================
    # Step 1: Download backup from object storage
    # ========================================
    echo ""
    echo "${YELLOW}Step 1: Downloading backup...${NC}"

    S3_PATH="s3://${S3_BUCKET}/open-ace/${RESTORE_TIMESTAMP}/backup.tar.gz"
    BACKUP_FILE="/tmp/backup-${RESTORE_TIMESTAMP}.tar.gz"

    AWS_CLI_OPTS=""
    if [ -n "$S3_ENDPOINT" ]; then
      AWS_CLI_OPTS="--endpoint-url $S3_ENDPOINT"
    fi

    if ! aws s3 cp "$S3_PATH" "$BACKUP_FILE" $AWS_CLI_OPTS; then
      echo "${RED}ERROR: Failed to download backup from $S3_PATH${NC}"
      exit 1
    fi

    # Extract backup
    tar -xzf "$BACKUP_FILE" -C "$RESTORE_DIR"

    # ========================================
    # Step 2: Verify backup integrity and version compatibility
    # ========================================
    echo ""
    echo "${YELLOW}Step 2: Verifying backup integrity and version compatibility...${NC}"

    if ! pg_restore --list "$RESTORE_DIR/db.dump" > /dev/null 2>&1; then
      echo "${RED}ERROR: Backup file is corrupted${NC}"
      exit 1
    fi

    echo "${GREEN}Backup integrity verified${NC}"

    # Check version compatibility if metadata exists
    if [ -f "$RESTORE_DIR/metadata.json" ]; then
      BACKUP_VERSION_NUM=$(grep -o '"postgresql_version_num": "[0-9]*"' "$RESTORE_DIR/metadata.json" | grep -o '[0-9]*' || echo "")

      if [ -n "$BACKUP_VERSION_NUM" ]; then
        CURRENT_VERSION_NUM=$(psql -h "$DB_HOST" -p "$DB_PORT" -U "$DB_USER" -d postgres -t -c "SHOW server_version_num;" 2>/dev/null | head -1 | xargs || echo "")

        if [ -n "$CURRENT_VERSION_NUM" ]; then
          echo "Backup PostgreSQL version number: $BACKUP_VERSION_NUM"
          echo "Current PostgreSQL version number: $CURRENT_VERSION_NUM"

          # Major version check (first 2 digits, e.g., 150000 -> 15)
          BACKUP_MAJOR=$(echo "$BACKUP_VERSION_NUM" | cut -c1-2)
          CURRENT_MAJOR=$(echo "$CURRENT_VERSION_NUM" | cut -c1-2)

          if [ "$BACKUP_MAJOR" != "$CURRENT_MAJOR" ]; then
            echo ""
            echo "${YELLOW}WARNING: PostgreSQL major version mismatch!${NC}"
            echo "  Backup major version: $BACKUP_MAJOR"
            echo "  Current major version: $CURRENT_MAJOR"
            echo "  Cross-version restore may have compatibility issues."
            echo "  Consider restoring to a database with matching version first."
            echo ""
            echo "${YELLOW}Continuing with restore... (this warning does not block the restore)${NC}"
          else
            echo "${GREEN}PostgreSQL version compatible${NC}"
          fi
        fi
      fi
    fi

    # ========================================
    # Step 3: Restore globals (if exists)
    # ========================================
    echo ""
    echo "${YELLOW}Step 3: Restoring global objects...${NC}"

    if [ -f "$RESTORE_DIR/globals.sql" ] && [ -s "$RESTORE_DIR/globals.sql" ]; then
      # Note: This may fail if the user doesn't have superuser privileges
      psql -h "$DB_HOST" -p "$DB_PORT" -U "$DB_USER" -d postgres -f "$RESTORE_DIR/globals.sql" 2>/dev/null || \
        echo "${YELLOW}WARNING: Could not restore globals (may require superuser)${NC}"
    else
      echo "${YELLOW}No globals.sql found, skipping${NC}"
    fi

    # ========================================
    # Step 4: Restore database
    # ========================================
    echo ""
    echo "${YELLOW}Step 4: Restoring database...${NC}"

    # Drop existing connections
    psql -h "$DB_HOST" -p "$DB_PORT" -U "$DB_USER" -d postgres -c \
      "SELECT pg_terminate_backend(pid) FROM pg_stat_activity WHERE datname = '$DB_NAME' AND pid <> pg_backend_pid();" 2>/dev/null || true

    # Drop and recreate database
    psql -h "$DB_HOST" -p "$DB_PORT" -U "$DB_USER" -d postgres -c "DROP DATABASE IF EXISTS $DB_NAME;" 2>/dev/null || \
      echo "${YELLOW}WARNING: Could not drop database (may have active connections)${NC}"

    psql -h "$DB_HOST" -p "$DB_PORT" -U "$DB_USER" -d postgres -c "CREATE DATABASE $DB_NAME;" 2>/dev/null || true

    # Restore from backup
    if ! pg_restore -h "$DB_HOST" -p "$DB_PORT" -U "$DB_USER" -d "$DB_NAME" --no-owner --no-privileges "$RESTORE_DIR/db.dump"; then
      echo "${RED}ERROR: Database restore failed${NC}"
      exit 1
    fi

    echo "${GREEN}Database restored successfully${NC}"

    # ========================================
    # Step 5: Cleanup
    # ========================================
    echo ""
    echo "${YELLOW}Step 5: Cleaning up...${NC}"

    rm -rf "$RESTORE_DIR" "$BACKUP_FILE"

    # Unset PGPASSWORD
    unset PGPASSWORD

    echo ""
    echo "=========================================="
    echo "${GREEN}Restore completed successfully!${NC}"
    echo "  Database: $DB_NAME"
    echo "  Backup date: $RESTORE_TIMESTAMP"
    echo "=========================================="

    exit 0
