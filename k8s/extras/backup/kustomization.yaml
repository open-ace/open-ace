# Open ACE - Backup Kustomization
# Usage: kubectl apply -k .

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: open-ace

resources:
  - serviceaccount.yaml
  - rbac.yaml
  - backup-script-configmap.yaml
  - cronjob.yaml
  - restore-job.yaml

# Common labels
commonLabels:
  app.kubernetes.io/name: open-ace
  app.kubernetes.io/component: backup
  app.kubernetes.io/managed-by: kustomize
