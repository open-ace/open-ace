# Open ACE - Kustomization
# Usage: kubectl apply -k k8s/

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: open-ace

resources:
  - namespace.yaml
  - configmap.yaml
  - storage.yaml
  - database.yaml
  - deployment.yaml
  - service.yaml
  - policies.yaml

# Common labels applied to all resources
commonLabels:
  app.kubernetes.io/managed-by: kustomize
  app.kubernetes.io/version: "1.0.0"

# Images (override for production)
images:
  - name: open-ace
    newName: open-ace
    newTag: latest

# Config generation
configMapGenerator:
  - name: open-ace-env
    literals:
      - ENVIRONMENT=production

# Secret generation (for dev only - use external secrets in production)
# secretGenerator:
#   - name: open-ace-secrets
#     literals:
#       - SECRET_KEY=dev-secret-key
