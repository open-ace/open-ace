# Open ACE - Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: open-ace
  namespace: open-ace
  labels:
    app.kubernetes.io/name: open-ace
    app.kubernetes.io/component: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: open-ace
      app.kubernetes.io/component: web
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: open-ace
        app.kubernetes.io/component: web
    spec:
      serviceAccountName: open-ace
      containers:
        - name: open-ace
          image: open-ace:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsNonRoot: false
            runAsUser: 0
          ports:
            - name: http
              containerPort: 19888
              protocol: TCP
          envFrom:
            - configMapRef:
                name: open-ace-config
            - secretRef:
                name: open-ace-secrets
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: data
              mountPath: /workspace
              subPath: workspace
            - name: logs
              mountPath: /app/logs
            - name: config
              mountPath: /root/.open-ace
              subPath: config
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: open-ace-data
        - name: logs
          emptyDir: {}
        - name: config
          persistentVolumeClaim:
            claimName: open-ace-data
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: open-ace
                topologyKey: kubernetes.io/hostname
      tolerations:
        - key: "node-role.kubernetes.io/master"
          operator: "Exists"
          effect: "NoSchedule"
