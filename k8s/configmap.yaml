# Open ACE - ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: open-ace-config
  namespace: open-ace
  labels:
    app.kubernetes.io/name: open-ace
    app.kubernetes.io/component: config
data:
  # Application settings
  FLASK_APP: "server.py"
  FLASK_ENV: "production"
  PYTHONUNBUFFERED: "1"
  LOG_LEVEL: "INFO"

  # Database settings (for PostgreSQL)
  DB_HOST: "postgres"
  DB_PORT: "5432"
  DB_NAME: "openace"

  # Redis settings
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"

  # Feature flags
  ENABLE_SSO: "true"
  ENABLE_MULTI_TENANT: "true"
  ENABLE_AUDIT_LOG: "true"
  ENABLE_CONTENT_FILTER: "true"
  WORKSPACE_BASE_DIR: "/workspace"

  # Retention settings
  AUDIT_LOG_RETENTION_DAYS: "90"
  DATA_RETENTION_DAYS: "365"

---
# Open ACE - Secrets
# NOTE: In production, use sealed-secrets or external secret management
apiVersion: v1
kind: Secret
metadata:
  name: open-ace-secrets
  namespace: open-ace
  labels:
    app.kubernetes.io/name: open-ace
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  # Placeholder values for local manifest smoke tests only.
  # Replace every value below with a strong generated secret before production use.
  SECRET_KEY: "replace-with-random-flask-secret"
  OPENACE_ENCRYPTION_KEY: "replace-with-random-dedicated-encryption-key"
  UPLOAD_AUTH_KEY: "replace-with-random-upload-auth-key"
  DB_USER: "openace"
  DB_PASSWORD: "replace-with-random-database-password"
  REDIS_PASSWORD: "replace-with-random-redis-password"
