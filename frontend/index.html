<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/static/icons/icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Open ACE - AI Computing Explorer" />
    <meta name="theme-color" content="#667eea" />
    <link rel="manifest" href="/static/manifest.json" />
    <link rel="apple-touch-icon" href="/static/icons/icon.svg" />
    <title>Open ACE - AI Computing Explorer</title>
    <!-- Preconnect for faster API requests -->
    <link rel="preconnect" href="/" />
  </head>
  <body>
    <div id="root">
      <!-- Loading state shown before React loads -->
      <div class="loading-overlay d-flex align-items-center justify-content-center vh-100">
        <div class="text-center">
          <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
          </div>
          <p class="mt-3 text-muted">Loading Open ACE...</p>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/static/js/dist/sw.js')
            .then((registration) => {
              console.log('SW registered:', registration.scope);
            })
            .catch((error) => {
              console.log('SW registration failed:', error);
            });
        });
      }
    </script>
  </body>
</html>
