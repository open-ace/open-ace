# Open ACE - AI Computing Explorer - Docker Compose Configuration
# For production deployment with PostgreSQL database
#
# Usage:
#   docker compose up -d                          # Basic deployment
#   docker compose --profile production up -d     # With nginx reverse proxy
#
# Multi-user workspace:
#   WORKSPACE_MULTI_USER_MODE=true docker compose up -d
#   Then create users via admin API — system users are auto-created in container

services:
  # ===========================================================================
  # Main Application
  # ===========================================================================
  open-ace:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: ${IMAGE_NAME:-open-ace:latest}
    container_name: open-ace
    restart: unless-stopped
    ports:
      - "${PORT:-5000}:5000"
      # Multi-user workspace: expose port range for qwen-code-webui instances
      - "${WORKSPACE_PORT_RANGE_START:-3100}-${WORKSPACE_PORT_RANGE_END:-3200}:${WORKSPACE_PORT_RANGE_START:-3100}-${WORKSPACE_PORT_RANGE_END:-3200}"
    environment:
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - UPLOAD_AUTH_KEY=${UPLOAD_AUTH_KEY:-change-me-in-production}
      # Database
      - DATABASE_URL=postgresql://${DB_USER:-ace}:${DB_PASSWORD:-ace-secret}@postgres:5432/${DB_NAME:-ace}
      # Multi-user Workspace
      - WORKSPACE_MULTI_USER_MODE=${WORKSPACE_MULTI_USER_MODE:-false}
      # Workspace base directory (users' projects stored under /workspace/<username>/)
      - WORKSPACE_BASE_DIR=/workspace
      # Data fetch: container runs as root, use venv Python (Issue #1121)
      - FETCH_USE_SUDO=false
      # Server IP for URL configuration (Issue #1260)
      # Defaults to host.docker.internal for one-click deploy
      # Users can override via .env file for production
      - SERVER_IP=${SERVER_IP:-host.docker.internal}
    # Allow container to access host network (Issue #1260)
    # Required for host.docker.internal on Linux Docker 20.10+
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # Config: Use named volume for persistence (Issue #1260)
      # Entrypoint will auto-generate config.json if not exists
      # Users can mount custom config: - ./my-config.json:/root/.open-ace/config.json:ro
      - config-data:/root/.open-ace
      - ./logs:/app/logs
      # Workspace data: per-user project directories, persisted across restarts
      - workspace-data:/workspace
      # SSH credentials for remote host access (optional, uncomment if needed)
      # SECURITY WARNING: Mounting SSH keys exposes private keys to container processes
      # Recommend using dedicated SSH keys with restricted commands in authorized_keys
      # - ~/.ssh:/root/.ssh:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - open-ace-network
    depends_on:
      postgres:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ===========================================================================
  # Optional: Nginx Reverse Proxy (for SSL termination)
  # ===========================================================================
  nginx:
    image: nginx:alpine
    container_name: open-ace-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - open-ace
    networks:
      - open-ace-network
    profiles:
      - production
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ===========================================================================
  # PostgreSQL Database (required for production)
  # ===========================================================================
  postgres:
    image: postgres:15-alpine
    container_name: open-ace-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${DB_USER:-ace}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-ace-secret}
      - POSTGRES_DB=${DB_NAME:-ace}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - open-ace-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ace} -d ${DB_NAME:-ace}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# =============================================================================
# Networks
# =============================================================================
networks:
  open-ace-network:
    driver: bridge

# =============================================================================
# Volumes
# =============================================================================
volumes:
  config-data:
    driver: local
  postgres-data:
    driver: local
  workspace-data:
    driver: local
